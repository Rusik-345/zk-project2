<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заявка</title>
    <link rel="stylesheet" href="style3.css">
</head>
<body>
    <header><h1>Жилой Комплекс</h1></header>
    <div class="main-container">
        <aside class="sidebar">
            <h3>Навигация</h3>
            <ul>
                <li><a href="index.html">Главная</a></li>
                <li><a href="prices.html">Цены</a></li>
                <li><a href="request.html" class="active">Заявка</a></li>
            </ul>
            <h3>Тема оформления</h3>
            <ul>
                <li><a href="#" data-theme="dark" class="active">Тёмная</a></li>
                <li><a href="#" data-theme="light">Светлая</a></li>
                <li><a href="#" data-theme="beige">Бежевая</a></li>
            </ul>
            <h3>Дополнительно</h3>
            <ul>
                <li><a href="#">Документы</a></li>
                <li><a href="#">Ход строительства</a></li>
                <li><a href="#">Регистрация</a></li>
            </ul>
        </aside>
        <div class="content-wrapper">
            <h2>Заявка на жильё</h2>
            <div class="form-container">
                <form id="requestForm">
                    <input type="text" id="name" placeholder="Имя *" required>
                    <input type="tel" id="phone" placeholder="Телефон *" required>
                    <select id="rooms">
                        <option value="">Комнатность</option>
                        <option>Студия</option>
                        <option>1 комната</option>
                        <option>2 комнаты</option>
                        <option>3 комнаты</option>
                    </select>
                    <button type="submit">Отправить заявку</button>
                </form>
                <p id="msg" class="form-message">✓ Заявка отправлена!</p>
            </div>
        </div>
    </div>
    <footer><p>Авторские права 2026</p></footer>
    <script>
        document.getElementById('requestForm').onsubmit = function(e) {
            e.preventDefault();
            let name = document.getElementById('name').value.trim();
            let phone = document.getElementById('phone').value.trim();
            if (!name) return alert('Введите имя');
            if (!phone || phone.replace(/\D/g,'').length<10) return alert('Введите телефон (10+ цифр)');
            this.style.display = 'none';
            document.getElementById('msg').classList.add('show');
            console.log({name, phone, rooms: document.getElementById('rooms').value});
        };
    </script>
    <script src="theme.js">
        // theme.js — переключение темы оформления
document.addEventListener('DOMContentLoaded', function() {
    const themeLinks = document.querySelectorAll('[data-theme]');
    const currentTheme = localStorage.getItem('siteTheme') || 'dark';
    applyTheme(currentTheme);

    themeLinks.forEach(link => {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            const theme = this.dataset.theme;
            applyTheme(theme);
            localStorage.setItem('siteTheme', theme);

            // Обновить активный класс в пунктах меню темы
            themeLinks.forEach(l => l.classList.remove('active'));
            this.classList.add('active');
        });
    });

    function applyTheme(theme) {
        document.body.className = theme;
        // Синхронизировать активную тему в меню (если текущая страница уже загружена)
        themeLinks.forEach(link => {
            link.classList.toggle('active', link.dataset.theme === theme);
        });
    }
});
    </script>
</body>
</html>

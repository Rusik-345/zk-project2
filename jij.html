<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заявка</title>
    <link rel="stylesheet" href="style3.css">
</head>
<body>
    <header><h1>Жилой Комплекс</h1></header>
    <div class="main-container">
        <aside class="sidebar">
            <h3>Навигация</h3>
            <ul>
                <li><a href="index.html">Главная</a></li>
                <li><a href="fif.html">Цены</a></li>
                <li><a href="jij.html" class="active">Заявка</a></li>
            </ul>
            <h3>Тема оформления</h3>
            <ul>
                <li><a href="#" data-theme="dark" class="active">Тёмная</a></li>
                <li><a href="#" data-theme="light">Светлая</a></li>
                <li><a href="#" data-theme="beige">Бежевая</a></li>
            </ul>
        </aside>
        <div class="content-wrapper">
            <h2>Заявка на жильё</h2>
            <div class="form-container">
                <form id="requestForm">
                    <input type="text" id="name" placeholder="Имя *" required>
                    <input type="tel" id="phone" placeholder="Телефон *" required>
                    <select id="rooms">
                        <option value="">Комнатность</option>
                        <option>Студия</option>
                        <option>1 комната</option>
                        <option>2 комнаты</option>
                        <option>3 комнаты</option>
                    </select>
                    <button type="submit">Отправить заявку</button>
                </form>
                <p id="msg" class="form-message">✓ Заявка отправлена!</p>
            </div>
        </div>
    </div>
    <footer><p>Авторские права 2026</p></footer>
    <script>
        document.getElementById('requestForm').onsubmit = function(e) {
            e.preventDefault();
            let name = document.getElementById('name').value.trim();
            let phone = document.getElementById('phone').value.trim();
            if (!name) return alert('Введите имя');
            if (!phone || phone.replace(/\D/g,'').length<10) return alert('Введите телефон (10+ цифр)');
            this.style.display = 'none';
            document.getElementById('msg').classList.add('show');
            console.log({name, phone, rooms: document.getElementById('rooms').value});
        };
    </script>
    <script>
// theme.js — корректное переключение тем с сохранением
document.addEventListener('DOMContentLoaded', function() {
    const themeLinks = document.querySelectorAll('[data-theme]');
    const savedTheme = localStorage.getItem('siteTheme') || 'dark';

    // Применяем сохранённую тему при загрузке
    applyTheme(savedTheme);

    // Навешиваем обработчики на все ссылки выбора темы
    themeLinks.forEach(link => {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            const theme = this.dataset.theme;
            applyTheme(theme);
            localStorage.setItem('siteTheme', theme);
        });
    });

    function applyTheme(theme) {
        // Меняем класс на body
        document.body.className = theme;

        // Обновляем активные пункты в меню темы
        themeLinks.forEach(link => {
            link.classList.remove('active');
            if (link.dataset.theme === theme) {
                link.classList.add('active');
            }
        });
    }
});
</script>
</body>
</html>
